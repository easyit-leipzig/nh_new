<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Checkliste">
<title>Checkliste</title>
<defs>

<filter id="shadow" x="-30%" y="-30%" width="160%" height="180%">
  <feDropShadow dx="0" dy="14" stdDeviation="13" flood-color="#001a3a" flood-opacity=".28"/>
</filter>
<filter id="soft" x="-30%" y="-30%" width="160%" height="180%">
  <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#001a3a" flood-opacity=".22"/>
</filter>
<linearGradient id="whiteGloss" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0" stop-color="#fff" stop-opacity=".85"/>
  <stop offset=".55" stop-color="#fff" stop-opacity=".15"/>
  <stop offset="1" stop-color="#fff" stop-opacity="0"/>
</linearGradient>

<linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0" stop-color="#ffffff"/>
  <stop offset="1" stop-color="#eaf2f9"/>
</linearGradient>
<linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0" stop-color="#0B67B2"/>
  <stop offset="1" stop-color="#053a73"/>
</linearGradient>

</defs>

<g filter="url(#shadow)">
  <rect x="42" y="42" width="428" height="428" rx="54" fill="url(#panel)" stroke="#d5e0ea" stroke-width="4"/>
  <path d="M76 88c92-37 238-48 352 12" fill="none" stroke="#fff" stroke-width="18" stroke-linecap="round" opacity=".75"/>

<g transform="translate(115 80)">
  <rect x="35" y="32" width="230" height="315" rx="18" fill="#fff" stroke="#0c4d91" stroke-width="12"/>
  <rect x="92" y="0" width="115" height="58" rx="17" fill="url(#accent)"/>
  <g fill="none" stroke="#0b5fae" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <path d="m70 104 15 15 29-36"/><line x1="137" y1="105" x2="225" y2="105"/>
    <path d="m70 168 15 15 29-36"/><line x1="137" y1="169" x2="225" y2="169"/>
    <path d="m70 232 15 15 29-36"/><line x1="137" y1="233" x2="225" y2="233"/>
  </g>
  <circle cx="245" cy="315" r="57" fill="#ffc400" stroke="#d99200" stroke-width="8"/>
  <path d="m215 315 20 20 42-52" fill="none" stroke="#fff" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
</g>

</g>

</svg>
