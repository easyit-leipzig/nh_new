<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>easyIT SVG-Paket</title>
<style>
body{font-family:Arial,sans-serif;margin:2rem;background:#f5f8fb;color:#052b57}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1rem}
.card{background:#fff;border:1px solid #dbe3ec;border-radius:14px;padding:1rem;box-shadow:0 4px 15px #0001}
img{width:100%;height:220px;object-fit:contain}
code{background:#eef3f8;padding:.15rem .35rem;border-radius:4px}
</style>
</head>
<body>
<h1>easyIT – SVG-Grafikpaket</h1>
<p>Alle Dateien sind echte, skalierbare SVG-Grafiken und bleiben bei jeder Auflösung scharf.</p>
<div class="grid">
  <div class="card"><img src="logo-easyit.svg"><code>logo-easyit.svg</code></div>
  <div class="card"><img src="hero-wissenschaft.svg"><code>hero-wissenschaft.svg</code></div>
  <div class="card"><img src="fach-mathematik.svg"><code>fach-mathematik.svg</code></div>
  <div class="card"><img src="fach-physik.svg"><code>fach-physik.svg</code></div>
  <div class="card"><img src="fach-chemie.svg"><code>fach-chemie.svg</code></div>
  <div class="card"><img src="fach-informatik.svg"><code>fach-informatik.svg</code></div>
</div>
</body>
</html>
