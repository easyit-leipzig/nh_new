<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Erfolgsdiagramm">
<title>Erfolgsdiagramm</title>
<defs>

<filter id="shadow" x="-30%" y="-30%" width="160%" height="180%">
  <feDropShadow dx="0" dy="14" stdDeviation="13" flood-color="#001a3a" flood-opacity=".28"/>
</filter>
<filter id="soft" x="-30%" y="-30%" width="160%" height="180%">
  <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#001a3a" flood-opacity=".22"/>
</filter>
<linearGradient id="whiteGloss" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0" stop-color="#fff" stop-opacity=".85"/>
  <stop offset=".55" stop-color="#fff" stop-opacity=".15"/>
  <stop offset="1" stop-color="#fff" stop-opacity="0"/>
</linearGradient>

<linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0" stop-color="#ffffff"/>
  <stop offset="1" stop-color="#eaf2f9"/>
</linearGradient>
<linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0" stop-color="#0B67B2"/>
  <stop offset="1" stop-color="#053a73"/>
</linearGradient>

</defs>

<g filter="url(#shadow)">
  <rect x="42" y="42" width="428" height="428" rx="54" fill="url(#panel)" stroke="#d5e0ea" stroke-width="4"/>
  <path d="M76 88c92-37 238-48 352 12" fill="none" stroke="#fff" stroke-width="18" stroke-linecap="round" opacity=".75"/>

<g transform="translate(92 95)">
  <ellipse cx="164" cy="287" rx="150" ry="24" fill="#052b57" opacity=".16"/>
  <rect x="24" y="215" width="48" height="65" rx="6" fill="#0a68b5"/>
  <rect x="92" y="170" width="48" height="110" rx="6" fill="#ffc400"/>
  <rect x="160" y="121" width="48" height="159" rx="6" fill="#16b5ae"/>
  <rect x="228" y="65" width="48" height="215" rx="6" fill="#7b2c9b"/>
  <path d="M21 171C89 156 150 111 218 61c28-21 48-39 81-76" fill="none" stroke="#1688dd" stroke-width="15" stroke-linecap="round"/>
  <path d="m284 0 30-12-4 32" fill="none" stroke="#1688dd" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
</g>

</g>

</svg>
