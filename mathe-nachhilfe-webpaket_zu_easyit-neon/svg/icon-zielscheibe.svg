<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Maßgeschneiderte Vorbereitung">
<title>Maßgeschneiderte Vorbereitung</title>

<defs>
  <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#168be0"/>
    <stop offset="1" stop-color="#063d79"/>
  </linearGradient>
  <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#ffd238"/>
    <stop offset="1" stop-color="#f2a500"/>
  </linearGradient>
  <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#ffffff"/>
    <stop offset="1" stop-color="#eaf1f7"/>
  </linearGradient>
  <filter id="shadow" x="-30%" y="-30%" width="170%" height="190%">
    <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#001b3a" flood-opacity=".24"/>
  </filter>
</defs>


<g filter="url(#shadow)">
  <circle cx="238" cy="260" r="156" fill="#fff" stroke="#0a4c8e" stroke-width="18"/>
  <circle cx="238" cy="260" r="112" fill="none" stroke="#0a4c8e" stroke-width="18"/>
  <circle cx="238" cy="260" r="66" fill="none" stroke="#0a4c8e" stroke-width="18"/>
  <circle cx="238" cy="260" r="20" fill="#0a4c8e"/>
  <path d="M245 252 405 92" stroke="#0a4c8e" stroke-width="19" stroke-linecap="round"/>
  <path d="m405 92-46 4 42-42z" fill="#0a4c8e"/>
</g>

</svg>