  <path d="M156 14 278 69v112c0 95-55 157-122 193C89 338 34 276 34 181V69z" fill="#ffc400" stroke="#dc9700" stroke-width="10"/>
  <path d="M156 45 246 86v94c0 72-39 122-90 154-51-32-90-82-90-154V86z" fill="url(#accent)" stroke="#062f60" stroke-width="8"/>
  <path d="m105 187 33 35 72-88" fill="none" stroke="#ffc400" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="m105 180 33 35 72-88" fill="none" stroke="#fff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
</g>

</g>

</svg>
